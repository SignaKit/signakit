name: Publish Java

on:
  push:
    branches: [main]

concurrency:
  group: publish-java
  cancel-in-progress: false

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      flags-java: ${{ steps.filter.outputs.flags-java }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            flags-java:
              - 'packages/flags-java/**'

  publish-flags-java:
    name: Publish flags-java
    needs: changes
    if: needs.changes.outputs.flags-java == 'true'
    runs-on: ubuntu-latest
    environment: publish
    defaults:
      run:
        working-directory: packages/flags-java
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      - name: Read version
        id: version
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "value=$VERSION" >> $GITHUB_OUTPUT

      - name: Check if version already published
        id: check
        run: |
          VERSION="${{ steps.version.outputs.value }}"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://repo1.maven.org/maven2/com/signakit/flags-java/${VERSION}/flags-java-${VERSION}.pom")
          if [ "$STATUS" = "200" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Version $VERSION already published — skipping."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Import GPG key
        if: steps.check.outputs.exists == 'false'
        run: echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import

      - name: Configure Maven settings
        if: steps.check.outputs.exists == 'false'
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<EOF
          <settings>
            <servers>
              <server>
                <id>central</id>
                <username>${{ secrets.MAVEN_CENTRAL_USERNAME }}</username>
                <password>${{ secrets.MAVEN_CENTRAL_PASSWORD }}</password>
              </server>
            </servers>
          </settings>
          EOF

      - name: Deploy to Maven Central
        if: steps.check.outputs.exists == 'false'
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: mvn --batch-mode deploy -Dgpg.passphrase="${GPG_PASSPHRASE}"
