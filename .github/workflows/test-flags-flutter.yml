name: Test — flags-flutter SDK

on:
  pull_request:
    paths:
      - 'packages/flags-flutter/**'
      - '.github/workflows/test-flags-flutter.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Analyze & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/flags-flutter

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test
