name: Test — flags-golang SDK

on:
  pull_request:
    paths:
      - 'packages/flags-golang/**'
      - '.github/workflows/test-flags-golang.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Vet & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/flags-golang

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Vet
        run: go vet ./...

      - name: Run tests
        run: go test ./...
