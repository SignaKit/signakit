name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # -------------------------------------------------------------------------
  # Detect which packages changed so downstream jobs can be conditional.
  # -------------------------------------------------------------------------
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      flags-node:         ${{ steps.filter.outputs.flags-node }}
      flags-browser:      ${{ steps.filter.outputs.flags-browser }}
      flags-react:        ${{ steps.filter.outputs.flags-react }}
      flags-react-native: ${{ steps.filter.outputs.flags-react-native }}
      flags-php:          ${{ steps.filter.outputs.flags-php }}
      flags-laravel:      ${{ steps.filter.outputs.flags-laravel }}
      flags-flutter:      ${{ steps.filter.outputs.flags-flutter }}
      flags-python:       ${{ steps.filter.outputs.flags-python }}
      flags-golang:       ${{ steps.filter.outputs.flags-golang }}
      flags-java:         ${{ steps.filter.outputs.flags-java }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            flags-node:
              - 'packages/flags-node/**'
            flags-browser:
              - 'packages/flags-browser/**'
            flags-react:
              - 'packages/flags-react/**'
            flags-react-native:
              - 'packages/flags-react-native/**'
            flags-php:
              - 'packages/flags-php/**'
            flags-laravel:
              - 'packages/flags-laravel/**'
            flags-flutter:
              - 'packages/flags-flutter/**'
            flags-python:
              - 'packages/flags-python/**'
            flags-golang:
              - 'packages/flags-golang/**'
            flags-java:
              - 'packages/flags-java/**'

  # -------------------------------------------------------------------------
  # SDK test jobs — each only runs when its package changed.
  # -------------------------------------------------------------------------
  test-flags-node:
    name: Test flags-node
    needs: changes
    if: needs.changes.outputs.flags-node == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/flags-node
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: packages/flags-node/package-lock.json
      - run: npm ci
      - run: npm test

  test-flags-browser:
    name: Test flags-browser
    needs: changes
    if: needs.changes.outputs.flags-browser == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/flags-browser
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: packages/flags-browser/package-lock.json
      - run: npm ci
      - run: npm test

  test-flags-react:
    name: Test flags-react
    needs: changes
    if: needs.changes.outputs.flags-react == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/flags-react
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: packages/flags-react/package-lock.json
      - run: npm ci
      - run: npm test

  test-flags-react-native:
    name: Test flags-react-native
    needs: changes
    if: needs.changes.outputs.flags-react-native == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/flags-react-native
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: packages/flags-react-native/package-lock.json
      - run: npm ci
      - run: npm test

  test-flags-php:
    name: Test flags-php
    needs: changes
    if: needs.changes.outputs.flags-php == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/flags-php
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none
      - run: composer install --no-progress --prefer-dist
      - run: ./vendor/bin/phpunit

  test-flags-laravel:
    name: Test flags-laravel
    needs: changes
    if: needs.changes.outputs.flags-laravel == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/flags-laravel
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none
      - run: composer install --no-progress --prefer-dist
      - run: ./vendor/bin/phpunit

  test-flags-flutter:
    name: Test flags-flutter
    needs: changes
    if: needs.changes.outputs.flags-flutter == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/flags-flutter
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test

  test-flags-python:
    name: Test flags-python
    needs: changes
    if: needs.changes.outputs.flags-python == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/flags-python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install -e ".[dev]"
      - run: pytest

  test-flags-golang:
    name: Test flags-golang
    needs: changes
    if: needs.changes.outputs.flags-golang == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/flags-golang
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
      - run: go vet ./...
      - run: go test ./...

  test-flags-java:
    name: Test flags-java
    needs: changes
    if: needs.changes.outputs.flags-java == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/flags-java
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven
      - run: mvn --batch-mode test

  # -------------------------------------------------------------------------
  # Gate job — always runs, fails if any test job failed or was cancelled.
  # Add "CI / Gate" as the single required status check in branch protection.
  # -------------------------------------------------------------------------
  gate:
    name: Gate
    runs-on: ubuntu-latest
    needs:
      - test-flags-node
      - test-flags-browser
      - test-flags-react
      - test-flags-react-native
      - test-flags-php
      - test-flags-laravel
      - test-flags-flutter
      - test-flags-python
      - test-flags-golang
      - test-flags-java
    if: always()
    steps:
      - name: All required checks passed
        run: |
          results='${{ toJSON(needs.*.result) }}'
          if echo "$results" | grep -qE '"failure"|"cancelled"'; then
            echo "One or more test jobs failed or were cancelled."
            exit 1
          fi
          echo "All checks passed or were skipped."
