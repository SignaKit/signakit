name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Detect which packages changed so downstream jobs can be conditional.
  # flags-react also triggers on flags-browser changes (local peer dep).
  # flags-laravel also triggers on flags-php changes (local path dep).
  # ---------------------------------------------------------------------------
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      flags-node:         ${{ steps.filter.outputs.flags-node }}
      flags-browser:      ${{ steps.filter.outputs.flags-browser }}
      flags-react:        ${{ steps.filter.outputs.flags-react }}
      flags-react-native: ${{ steps.filter.outputs.flags-react-native }}
      flags-php:          ${{ steps.filter.outputs.flags-php }}
      flags-laravel:      ${{ steps.filter.outputs.flags-laravel }}
      flags-flutter:      ${{ steps.filter.outputs.flags-flutter }}
      flags-python:       ${{ steps.filter.outputs.flags-python }}
      flags-golang:       ${{ steps.filter.outputs.flags-golang }}
      flags-java:         ${{ steps.filter.outputs.flags-java }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            flags-node:
              - 'packages/flags-node/**'
            flags-browser:
              - 'packages/flags-browser/**'
            flags-react:
              - 'packages/flags-react/**'
              - 'packages/flags-browser/**'
            flags-react-native:
              - 'packages/flags-react-native/**'
            flags-php:
              - 'packages/flags-php/**'
            flags-laravel:
              - 'packages/flags-laravel/**'
              - 'packages/flags-php/**'
            flags-flutter:
              - 'packages/flags-flutter/**'
            flags-python:
              - 'packages/flags-python/**'
            flags-golang:
              - 'packages/flags-golang/**'
            flags-java:
              - 'packages/flags-java/**'

  # ---------------------------------------------------------------------------
  # SDK test jobs
  # ---------------------------------------------------------------------------
  test-flags-node:
    name: Test flags-node
    needs: changes
    if: needs.changes.outputs.flags-node == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/flags-node
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: packages/flags-node/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run build

  test-flags-browser:
    name: Test flags-browser
    needs: changes
    if: needs.changes.outputs.flags-browser == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/flags-browser
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: packages/flags-browser/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run build

  test-flags-react:
    name: Test flags-react
    needs: [changes, test-flags-browser]
    if: |
      always() &&
      needs.changes.outputs.flags-react == 'true' &&
      (needs.test-flags-browser.result == 'success' || needs.test-flags-browser.result == 'skipped')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/flags-react
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            packages/flags-browser/package-lock.json
            packages/flags-react/package-lock.json
      - name: Build flags-browser (local peer dependency)
        working-directory: packages/flags-browser
        run: npm ci && npm run build
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run build

  test-flags-react-native:
    name: Test flags-react-native
    needs: changes
    if: needs.changes.outputs.flags-react-native == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/flags-react-native
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: packages/flags-react-native/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run build

  test-flags-php:
    name: Test flags-php
    needs: changes
    if: needs.changes.outputs.flags-php == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/flags-php
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: json, curl
          coverage: xdebug
      - run: composer install --prefer-dist --no-progress
      - run: vendor/bin/phpunit

  test-flags-laravel:
    name: Test flags-laravel
    needs: [changes, test-flags-php]
    if: |
      always() &&
      needs.changes.outputs.flags-laravel == 'true' &&
      (needs.test-flags-php.result == 'success' || needs.test-flags-php.result == 'skipped')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/flags-laravel
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: json, curl
          coverage: xdebug
      - name: Install dependencies
        run: |
          composer config repositories.flags-php '{"type":"path","url":"../flags-php","options":{"symlink":false}}'
          composer config minimum-stability dev
          composer config prefer-stable true
          composer require 'signakit/flags-php:*@dev' --no-update
          composer install --prefer-dist --no-progress
      - run: vendor/bin/phpunit

  test-flags-flutter:
    name: Test flags-flutter
    needs: changes
    if: needs.changes.outputs.flags-flutter == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/flags-flutter
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test

  test-flags-python:
    name: Test flags-python
    needs: changes
    if: needs.changes.outputs.flags-python == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/flags-python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: packages/flags-python/pyproject.toml
      - run: pip install -e ".[dev]"
      - run: mypy
      - run: ruff check src tests
      - run: pytest

  test-flags-golang:
    name: Test flags-golang
    needs: changes
    if: needs.changes.outputs.flags-golang == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/flags-golang
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
      - run: go vet ./...
      - run: go test ./...

  test-flags-java:
    name: Test flags-java
    needs: changes
    if: needs.changes.outputs.flags-java == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/flags-java
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven
      - run: mvn --batch-mode test

  # ---------------------------------------------------------------------------
  # Gate job — always runs, fails if any test job failed or was cancelled.
  # Add "CI / Gate" as the single required status check in branch protection.
  # ---------------------------------------------------------------------------
  gate:
    name: Gate
    runs-on: ubuntu-latest
    needs:
      - test-flags-node
      - test-flags-browser
      - test-flags-react
      - test-flags-react-native
      - test-flags-php
      - test-flags-laravel
      - test-flags-flutter
      - test-flags-python
      - test-flags-golang
      - test-flags-java
    if: always()
    steps:
      - name: All required checks passed
        run: |
          results='${{ toJSON(needs.*.result) }}'
          if echo "$results" | grep -qE '"failure"|"cancelled"'; then
            echo "One or more test jobs failed or were cancelled."
            exit 1
          fi
          echo "All checks passed or were skipped."
